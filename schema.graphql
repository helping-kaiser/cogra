type AuthSession {
	accessToken: String!
	refreshToken: String!
	session: Session!
	user: User!
}

"""
Implement the DateTime<Utc> scalar

The input/output is a string in RFC3339 format.
"""
scalar DateTime

"""
A signed edge-tensor dimension: a float constrained to the closed range
[-1.0, +1.0]. The range invariant lives in the type rather than in a plain
Float.
"""
scalar Dimension

"""
Append a new layer to the viewer's own profile (api-spec.md
"EditProfileInput"). Self only — the viewer is the edited User, so there is
no id. Omitted fields carry forward from the current version; a blank `bio`
/ `websiteUrl` clears that field. The media fields (avatar / cover) arrive
with the media slice.
"""
input EditProfileInput {
	handle: String
	displayName: String
	bio: String
	websiteUrl: String
}

"""
The viewer's `User` after an `editProfile`. `user` is null with a userError
when the edit was rejected — `BAD_INPUT` for a bad field value,
`HANDLE_TAKEN` for a handle already in use (api-spec.md). An anonymous
caller gets a tier-1 `UNAUTHENTICATED` transport fault instead, not a
userError.
"""
type EditProfilePayload {
	user: User
	userErrors: [UserError!]!
}

"""
The one error vocabulary, shared across both error tiers (governing
principles): the `extensions.code` on a transport fault and the `code` on a
`UserError` both draw from it. Grows as gestures add expected failures.
"""
enum ErrorCode {
	"""
	No / invalid access token where one is required.
	"""
	UNAUTHENTICATED
	"""
	Authenticated but not eligible (actAs, field-auth).
	"""
	FORBIDDEN
	"""
	An id resolved to nothing.
	"""
	NOT_FOUND
	"""
	Malformed args, or a constraint not modeled as data.
	"""
	BAD_INPUT
	"""
	An auth endpoint's per-IP / per-account backoff.
	"""
	RATE_LIMITED
	"""
	Collapsed server fault; detail is logged, not surfaced.
	"""
	INTERNAL
	"""
	Email / password pair did not match.
	"""
	INVALID_CREDENTIALS
	"""
	Invite link invalid, expired, revoked, or consumed.
	"""
	INVITE_UNUSABLE
	"""
	The requested handle is already in use.
	"""
	HANDLE_TAKEN
	"""
	Under the length floor or in the breach corpus.
	"""
	WEAK_PASSWORD
	"""
	A live pending registration already holds this email.
	"""
	REGISTRATION_IN_PROGRESS
	"""
	Registration verification token invalid or expired.
	"""
	VERIFICATION_TOKEN_INVALID
	"""
	Refresh token invalid, expired, or reuse-detected.
	"""
	REFRESH_TOKEN_INVALID
}

"""
Per-field moderation state.
"""
enum FieldModerationStatus {
	NORMAL
	SENSITIVE
	REDACTED
}

"""
Connectivity report for the API process and its two stores.
"""
type Health {
	"""
	Version of the backend serving this schema.
	"""
	backendVersion: String!
	"""
	True when PostgreSQL (the display-content store) answers a round-trip
	probe.
	"""
	postgresConnected: Boolean!
	"""
	True when Memgraph (the graph store) answers a round-trip probe.
	"""
	memgraphConnected: Boolean!
}

input LogInInput {
	email: String!
	password: String!
	deviceLabel: String
}

"""
A session from credentials; `auth` is null with an INVALID_CREDENTIALS
userError when the email / password pair did not match.
"""
type LogInPayload {
	auth: AuthSession
	userErrors: [UserError!]!
}

"""
Text carrying its own moderation status. `value` is null when the field is
redacted, or unset where the field is optional — `status` disambiguates.
"""
type ModeratedText {
	value: String
	status: FieldModerationStatus!
}

"""
A node's moderation state — the cached max severity across its per-field
statuses.
"""
enum ModerationStatus {
	NORMAL
	SENSITIVE
	ILLEGAL
}

type Mutation {
	"""
	Submit a registration through an invite link. Writes the off-graph
	pending record and sends the verification email (dev: logs the token)
	— no User node or session exists until verifyEmail.
	"""
	register(input: RegisterInput!): RegisterPayload!
	"""
	Complete registration with the emailed verification token. Atomically
	creates the User node and its Wallet, writes the two invitation edges,
	and issues the first session (auth.md).
	"""
	verifyEmail(input: VerifyEmailInput!): VerifyEmailPayload!
	"""
	Authenticate with email + password; issues a new session.
	"""
	logIn(input: LogInInput!): LogInPayload!
	"""
	Rotate the refresh token and mint a fresh access token.
	"""
	refreshSession(input: RefreshSessionInput!): RefreshPayload!
	"""
	Append a new layer to the viewer's own profile (handle, displayName,
	bio, websiteUrl). Self only — the viewer is the edited User. Requires a
	session; an anonymous caller gets an UNAUTHENTICATED transport fault.
	"""
	editProfile(input: EditProfileInput!): EditProfilePayload!
}

"""
Network-scope role for a User.
"""
enum NetworkRole {
	MEMBER
	MODERATOR
}

type Query {
	"""
	Reports whether the API can reach both of its stores. Reachable stores
	answer round-trip probes; a `false` means that store is down or
	unreachable, not that the API itself is.
	"""
	health: Health!
	"""
	Resolve the request's auth token to the viewer's own User node. Null
	when the request is unauthenticated — the one query a client cannot
	express generically, since it does not yet know its own id.
	"""
	me: User
}

"""
A rotated session; `auth` is null with a REFRESH_TOKEN_INVALID userError
when the refresh token is invalid, expired, or was already rotated.
"""
type RefreshPayload {
	auth: AuthSession
	userErrors: [UserError!]!
}

input RefreshSessionInput {
	refreshToken: String!
}

"""
Register through an invite link.
"""
input RegisterInput {
	inviteLink: UUID!
	handle: String!
	email: String!
	password: String!
	"""
	The invitee's own outgoing edge toward the inviter. Null means an
	explicit skip: the `(+0.5, +0.5)` fallback (invitations.md).
	"""
	dim1: Dimension
	dim2: Dimension
}

"""
The pending registration's receipt; no User node or session exists yet
(both arrive at verifyEmail). On refusal `expires_at` is null and
`user_errors` carries the reason.
"""
type RegisterPayload {
	"""
	When the pending registration expires unverified (24 h, auth.md); null
	when the registration was refused.
	"""
	expiresAt: DateTime
	userErrors: [UserError!]!
}

"""
An active authentication session — one per refresh token.
"""
type Session {
	id: UUID!
	deviceLabel: String
	createdAt: DateTime!
	lastUsedAt: DateTime
	expiresAt: DateTime!
	"""
	Whether this is the session that issued the current request.
	"""
	isCurrent: Boolean!
}

"""
A UUID is a unique 128-bit number, stored as 16 octets. UUIDs are parsed as
Strings within GraphQL. UUIDs are used to assign unique identifiers to
entities without requiring a central allocating authority.

# References

* [Wikipedia: Universally Unique Identifier](http://en.wikipedia.org/wiki/Universally_unique_identifier)
* [RFC4122: A Universally Unique Identifier (UUID) URN Namespace](http://tools.ietf.org/html/rfc4122)
"""
scalar UUID

type User {
	id: UUID!
	"""
	The unique mention handle — the User's username.
	"""
	handle: ModeratedText!
	displayName: ModeratedText!
	bio: ModeratedText!
	websiteUrl: ModeratedText!
	"""
	Network-scope role. Only Users carry one.
	"""
	networkRole: NetworkRole!
	"""
	Node-level cache: max moderation severity across this actor's fields.
	"""
	moderationStatus: ModerationStatus!
	createdAt: DateTime!
	"""
	When this node last changed — its most recent profile version; equals
	createdAt if never edited.
	"""
	updatedAt: DateTime!
}

"""
A recoverable, expected failure of a mutation — a bad value or a
business-rule rejection the end user should see and act on. A payload's
`userErrors` is empty exactly when the mutation succeeded; a non-empty list
means the named result field is null.
"""
type UserError {
	"""
	Developer-facing fallback text; the client localizes off `code`.
	"""
	message: String!
	"""
	The stable code the client switches on.
	"""
	code: ErrorCode!
	"""
	Path to the offending input field — e.g. `["declaredGoal"]`; null for a
	whole-operation failure.
	"""
	field: [String!]
}

input VerifyEmailInput {
	verificationToken: String!
	deviceLabel: String
}

"""
First session from a verified registration; `auth` is null with a
VERIFICATION_TOKEN_INVALID userError when the token is invalid or its
pending registration expired.
"""
type VerifyEmailPayload {
	auth: AuthSession
	userErrors: [UserError!]!
}

"""
Directs the executor to include this field or fragment only when the `if` argument is true.
"""
directive @include(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Directs the executor to skip this field or fragment when the `if` argument is true.
"""
directive @skip(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Provides a scalar specification URL for specifying the behavior of custom scalar types.
"""
directive @specifiedBy(url: String!) on SCALAR
schema {
	query: Query
	mutation: Mutation
}
